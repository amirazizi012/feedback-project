<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد مدیریت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- بخش لاگین -->
    <div id="login-section" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">ورود مدیر</h2>
        <div id="login-error" class="hidden mb-4 p-2 bg-red-100 text-red-700 text-sm rounded text-center"></div>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block mb-1 text-sm">نام کاربری</label>
                <input type="text" id="username" dir="ltr" class="w-full border p-2 text-left rounded focus:outline-none focus:border-blue-500" required>
            </div>
            <div>
                <label class="block mb-1 text-sm">رمز عبور</label>
                <input type="password" id="password" dir="ltr" class="w-full border p-2 text-left rounded focus:outline-none focus:border-blue-500" required>
            </div>
            <button type="submit" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 rounded">ورود</button>
        </form>
    </div>

    <!-- داشبورد مدیریت -->
    <div id="dashboard-section" class="hidden max-w-5xl mx-auto mt-10 p-4">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded shadow-sm">
            <h1 class="text-xl font-bold text-gray-800">داشبورد بازخوردها</h1>
            <div class="flex items-center gap-4">
                <a href="/" class="text-sm text-blue-600 hover:underline">مشاهده فرم ثبت فیدبک</a>
                <button onclick="logout()" class="text-sm bg-red-50 text-red-600 px-3 py-1 rounded border border-red-200 hover:bg-red-100">خروج</button>
            </div>
        </div>

        <div class="bg-white rounded shadow-sm overflow-hidden border border-gray-200">
            <table class="w-full text-right text-sm">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4">شناسه</th>
                        <th class="p-4">عنوان</th>
                        <th class="p-4">پیام</th>
                        <th class="p-4">تاریخ ثبت</th>
                        <th class="p-4">وضعیت</th>
                        <th class="p-4">عملیات</th>
                    </tr>
                </thead>
                <tbody id="feedbacks-tbody" class="divide-y">
                    <!-- داده‌ها اینجا تزریق می‌شوند -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('login-form');
        const feedbacksTbody = document.getElementById('feedbacks-tbody');

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                showDashboard();
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    document.getElementById('login-error').style.display = 'none';
                    showDashboard();
                } else {
                    const errBox = document.getElementById('login-error');
                    errBox.innerText = 'نام کاربری یا رمز عبور اشتباه است.';
                    errBox.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
            }
        });

        function logout() {
            localStorage.removeItem('token');
            feedbacksTbody.innerHTML = '';
            dashboardSection.style.display = 'none';
            loginSection.style.display = 'block';
            document.getElementById('password').value = '';
        }

        async function showDashboard() {
            loginSection.style.display = 'none';
            dashboardSection.style.display = 'block';
            await loadFeedbacks();
        }

        async function loadFeedbacks() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/feedbacks', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    logout();
                    return;
                }

                const data = await res.json();
                renderTable(data);
            } catch (err) {
                console.error(err);
            }
        }

        function renderTable(feedbacks) {
            feedbacksTbody.innerHTML = '';
            feedbacks.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50";
                
                const date = new Date(item.created_at).toLocaleString('fa-IR');
                
                let selectClass = "border rounded p-1 text-sm outline-none w-full ";
                if (item.status === 'ثبت شده') selectClass += "bg-gray-100";
                else if (item.status === 'در حال بررسی') selectClass += "bg-blue-50 text-blue-700";
                else selectClass += "bg-green-50 text-green-700";

                tr.innerHTML = `
                    <td class="p-4 text-gray-500">#${item.id}</td>
                    <td class="p-4 font-bold text-gray-700">${item.title}</td>
                    <td class="p-4 text-gray-600 max-w-xs truncate" title="${item.message}">${item.message}</td>
                    <td class="p-4 text-gray-500" dir="ltr">${date}</td>
                    <td class="p-4 font-bold">${item.status}</td>
                    <td class="p-4">
                        <select onchange="updateStatus(${item.id}, this.value)" class="${selectClass}">
                            <option value="ثبت شده" ${item.status === 'ثبت شده' ? 'selected' : ''}>ثبت شده</option>
                            <option value="در حال بررسی" ${item.status === 'در حال بررسی' ? 'selected' : ''}>در حال بررسی</option>
                            <option value="رسیدگی شده" ${item.status === 'رسیدگی شده' ? 'selected' : ''}>رسیدگی شده</option>
                        </select>
                    </td>
                `;
                feedbacksTbody.appendChild(tr);
            });
        }

        async function updateStatus(id, newStatus) {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/feedbacks/${id}`, {
                    method: 'PATCH',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (res.ok) {
                    loadFeedbacks();
                } else if(res.status === 401) {
                    logout();
                } else {
                    alert('خطا در تغییر وضعیت');
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
